
<input type="text" placeholder="id" [(ngModel)]="personToAdd.id" class="border border-gray-300 rounded-2xl px-4 py-2 mb-4">
<input type="text" placeholder="name" [(ngModel)]="personToAdd.name" class="border border-gray-300 rounded-2xl px-4 py-2 mb-4">
<input type="text" placeholder="age" [(ngModel)]="personToAdd.age" class="border border-gray-300 rounded-2xl px-4 py-2 mb-4">
<button class="bg-green-500 text-white rounded-2xl" (click)="addPerson()">Add Person</button>
