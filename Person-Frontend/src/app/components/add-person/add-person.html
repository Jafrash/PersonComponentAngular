<div class="add-person-form">
  <h3>Add New Person</h3>
  <div class="form-group">
    <input type="text" placeholder="ID" [(ngModel)]="personToAdd.id">
  </div>
  <div class="form-group">
    <input type="text" placeholder="Name" [(ngModel)]="personToAdd.name">
  </div>
  <div class="form-group">
    <input type="number" placeholder="Age" [(ngModel)]="personToAdd.age">
  </div>
  <button class="submit-btn" (click)="addPerson()">Add Person</button>
</div>
